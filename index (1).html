<!-- ---- 本機儲存模擬（讓程式在 Claude 平台以外也能運作） ---- -->
<!-- 注意：資料只會存在使用者「自己的瀏覽器」裡，不會跨裝置 / 跨使用者同步 -->
<script>
  window.storage = {
    async get(key, shared) {
      const raw = localStorage.getItem(key);
      if (raw === null) throw new Error("key not found: " + key);
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared) {
      localStorage.setItem(key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared) {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      const keys = Object.keys(localStorage).filter((k) => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: !!shared };
    },
  };
</script>

// 將某一天（可能橫跨多個工地）的出勤紀錄，彙整成單一代表狀態
function summarizeDayStatus(entries) {
  if (entries.length === 0) return "未記錄";
  if (entries.some((e) => e.session === "全天")) return "全天";
  const sessions = new Set(entries.map((e) => e.session));
  if (sessions.has("上午") && sessions.has("下午")) return "全天";
  if (sessions.has("上午")) return "上午";
  if (sessions.has("下午")) return "下午";
  return "未記錄";
}

const shiftDate = (dateStr, offset) => {
  const [y, m, day] = dateStr.split("-").map(Number);
  const d = new Date(y, m - 1, day);
  d.setDate(d.getDate() + offset);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
};
const formatDateLabel = (dateStr) => {
  const d = new Date(dateStr + "T00:00:00");
  const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
  return `${d.getMonth() + 1}/${d.getDate()}（週${weekdays[d.getDay()]}）`;
};
const shiftMonth = (monthStr, offset) => {
  let [y, m] = monthStr.split("-").map(Number);
  m += offset;
  while (m > 12) { m -= 12; y += 1; }
  while (m < 1) { m += 12; y -= 1; }
  return `${y}-${pad2(m)}`;
};

// ---- 共用小元件 --------------------------------------------------------
function BlueprintBG({ children }) {
  return (
    <div
      style={{
        background: `${COLOR.bg} repeating-linear-gradient(0deg, ${COLOR.line} 0px, transparent 1px, transparent 28px, ${COLOR.line} 29px), repeating-linear-gradient(90deg, ${COLOR.line} 0px, transparent 1px, transparent 28px, ${COLOR.line} 29px)`,
        backgroundSize: "29px 29px",
        minHeight: "100vh",
      }}
      className="w-full"
    >
      {children}
    </div>
  );
}

function Stamp({ status }) {
  const map = {
    未發文: { color: COLOR.muted, label: "未發文" },
    已發文: { color: COLOR.success, label: "已發文" },
  };
  const s = map[status] || map["未發文"];
  return (
    <span
      style={{ color: s.color, borderColor: s.color, transform: "rotate(-4deg)", letterSpacing: "0.15em" }}
      className="inline-block border-2 border-dashed rounded px-2 py-0.5 text-xs font-bold shrink-0"
    >
      {s.label}
    </span>
  );
}

function EmptyState({ icon: Icon, title, hint }) {
  return (
    <div className="flex flex-col items-center justify-center text-center py-16 px-6">
      <Icon size={36} style={{ color: COLOR.muted }} strokeWidth={1.5} />
      <p style={{ color: COLOR.ink }} className="mt-3 font-bold">{title}</p>
      <p style={{ color: COLOR.muted }} className="text-sm mt-1">{hint}</p>
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
      <div className="absolute inset-0 bg-black/60" onClick={onClose} />
      <div
        style={{ background: COLOR.surface, borderColor: COLOR.border }}
        className="relative w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl border p-5 max-h-[85vh] overflow-y-auto"
      >
        <div className="flex items-center justify-between mb-4">
          <h3 style={{ color: COLOR.ink }} className="font-black text-lg">{title}</h3>
          <button onClick={onClose} className="p-1"><X size={20} style={{ color: COLOR.muted }} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function FieldLabel({ children }) {
  return <label style={{ color: COLOR.muted }} className="block text-xs font-bold tracking-wide mb-1">{children}</label>;
}

function AddBtn({ onClick, label }) {
  return (
    <button onClick={onClick} style={{ background: COLOR.red }} className="flex items-center gap-1 text-white text-xs font-bold rounded-full pl-2 pr-3 py-1.5">
      <Plus size={14} /> {label}
    </button>
  );
}

// ---- 視窗縮放控制（一般畫面禁止縮放，看圖時才允許放大） ------------------
function setViewportScale(allowZoom) {
  try {
    let meta = document.querySelector('meta[name="viewport"]');
    if (!meta) {
      meta = document.createElement("meta");
      meta.name = "viewport";
      document.head.appendChild(meta);
    }
    meta.content = allowZoom
      ? "width=device-width, initial-scale=1"
      : "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no";
  } catch (err) {
    // 部分環境無法存取 document，安全略過

// ---- 圖片壓縮工具（上傳時自動縮小，避免資料過大） -------------------------
function resizeImageFile(file, maxSize = 1000, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("讀取檔案失敗"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("圖片載入失敗"));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxSize || height > maxSize) {
          if (width > height) { height = Math.round((height * maxSize) / width); width = maxSize; }
          else { width = Math.round((width * maxSize) / height); height = maxSize; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function WorkerDetailView({ worker, sites, attendance, monthStr, onMonthChange }) {
  const [year, month] = monthStr.split("-").map(Number);
  const firstWeekday = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const siteName = (id) => sites.find((s) => s.id === id)?.name || "";

  const dayEntries = (d) => {
    const dateStr = `${year}-${pad2(month)}-${pad2(d)}`;
    const record = attendance[dateStr] || {};
    const entries = Object.keys(record)
      .filter((k) => k.endsWith(`__${worker.id}`) && record[k] !== "未記錄")
      .map((k) => ({ siteId: k.split("__")[0], session: record[k] }));
    return { dateStr, entries, status: summarizeDayStatus(entries) };
  };

  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const counts = { 全天: 0, 上午: 0, 下午: 0 };
  const recorded = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const info = dayEntries(d);
    if (info.status !== "未記錄") {
      counts[info.status] += 1;
      recorded.push({ day: d, ...info });
    }
  }
  recorded.sort((a, b) => b.day - a.day);
  const workDays = counts.全天 + counts.上午 * 0.5 + counts.下午 * 0.5;

  const weekdayLabels = ["日", "一", "二", "三", "四", "五", "六"];

  return (
    <div>
      <div style={{ background: COLOR.surfaceAlt }} className="flex items-center justify-between rounded-xl px-2 py-2 mb-4">
        <button onClick={() => onMonthChange(shiftMonth(monthStr, -1))} className="p-2"><ChevronLeft size={18} color="#fff" /></button>
        <p className="text-white font-bold text-sm">{year}年{month}月</p>
        <button onClick={() => onMonthChange(shiftMonth(monthStr, 1))} className="p-2"><ChevronRight size={18} color="#fff" /></button>
      </div>

      <div className="flex gap-2 mb-2">
        {["全天", "上午", "下午"].map((s) => (
          <div key={s} style={{ borderColor: ATTEND_COLOR[s], color: ATTEND_COLOR[s] }} className="flex-1 border rounded-lg py-1.5 text-center">
            <p className="text-base font-black leading-none">{counts[s]}</p>
            <p className="text-[10px] font-bold mt-0.5">{s}</p>
          </div>
        ))}
      </div>
      <p style={{ color: COLOR.muted }} className="text-xs text-center mb-4">本月工作天數約 <span style={{ color: COLOR.ink }} className="font-bold">{workDays}</span> 天</p>

      <div style={{ background: COLOR.surface, borderColor: COLOR.border }} className="border rounded-xl p-3 mb-4">
        <div className="grid grid-cols-7 gap-1 mb-1">
          {weekdayLabels.map((w) => (
            <div key={w} style={{ color: COLOR.muted }} className="text-center text-[10px] font-bold py-1">{w}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (d === null) return <div key={`b${i}`} />;
            const info = dayEntries(d);
            const isToday = info.dateStr === todayStr();
            return (
              <div
                key={d}
                style={{
                  background: info.status === "未記錄" ? "transparent" : ATTEND_COLOR[info.status],
                  color: info.status === "未記錄" ? COLOR.muted : "#fff",
                  border: isToday ? `1px solid ${COLOR.red}` : "1px solid transparent",
                }}
                className="aspect-square rounded-md flex items-center justify-center text-xs font-bold"
              >
                {d}
              </div>
            );
          })}
        </div>
      </div>

      <h3 style={{ color: COLOR.ink }} className="font-bold text-sm mb-2">本月紀錄</h3>
      {recorded.length === 0 ? (
        <EmptyState icon={Users} title="本月尚無出勤紀錄" hint="請至各工地的工班出勤登記" />
      ) : (
        <ul className="space-y-2">
          {recorded.map((r) => (
            <li key={r.day} style={{ background: COLOR.surface, borderColor: COLOR.border }} className="border rounded-xl p-3">
              <div className="flex items-center justify-between mb-1">
                <p style={{ color: COLOR.ink }} className="font-bold text-sm">{month}/{r.day}</p>
                <span style={{ color: ATTEND_COLOR[r.status], borderColor: ATTEND_COLOR[r.status] }} className="text-xs font-bold border-2 rounded-full px-3 py-1">
                  {r.status}
                </span>
              </div>
              {r.entries.map((e, i) => (
                <p key={i} style={{ color: COLOR.muted }} className="text-xs">{siteName(e.siteId)}（{e.session}）</p>
              ))}
            </li>
          ))}

        </ul>
      )}
    </div>
  );
}

function DocModal({ onClose, onSave }) {

  const [date, setDate] = useState(todayStr());

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploading(true);
    try {
      const dataUrl = await resizeImageFile(file);
      setImageUrl(dataUrl);
    } catch (err) {
      console.error("圖片處理失敗", err);
    } finally {
      setUploading(false);
    }
  };

  return (
    <Modal title="新增文件" onClose={onClose}>

              className="flex-1 border rounded-lg py-2 text-sm font-bold">
              {t}
            </button>
          ))}
        </div>
        <div>
          <FieldLabel>文件主旨</FieldLabel>
          <input value={title} onChange={(e) => setTitle(e.target.value)} style={inputStyle} className="w-full border rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <FieldLabel>{type === "收文" ? "來文單位" : "受文單位"}</FieldLabel>
          <input value={who} onChange={(e) => setWho(e.target.value)} style={inputStyle} className="w-full border rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <FieldLabel>日期</FieldLabel>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={inputStyle} className="w-full border rounded-lg px-3 py-2 text-sm" />

              <button onClick={() => setImageUrl("")} style={{ background: COLOR.surfaceAlt }} className="absolute top-2 right-2 p-1.5 rounded-full">
                <X size={14} color="#fff" />
              </button>
            </div>
          ) : (
            <label style={{ borderColor: COLOR.border, color: COLOR.muted }} className="flex flex-col items-center justify-center gap-1.5 border border-dashed rounded-lg py-6 cursor-pointer">
              <input type="file" accept="image/*" capture="environment" onChange={handleFile} className="hidden" />
              {uploading ? <span className="text-xs">處理中…</span> : (
                <>
                  <Upload size={20} />

              )}
            </label>
          )}
        </div>
        <button
          disabled={!title.trim()}
          onClick={() => onSave({ type, title: title.trim(), who: who.trim() || "未填寫", date, imageUrl, status: type === "發文" ? "未發文" : undefined })}

            <div style={{ background: COLOR.gold, width: `${pct}%` }} className="h-full rounded-full" />

    { id: uid(), title: "測試", date: d(1), cat: "其他", siteId: "site-a" },
    { id: uid(), title: "測試", date: d(3), cat: "灌漿", siteId: "site-a" },
    { id: uid(), title: "測試", date: d(6), cat: "驗收", siteId: "site-a" },
    { id: uid(), title: "測試", date: d(2), cat: "進場", siteId: "site-b" },
    { id: uid(), title: "測試", date: d(4), cat: "其他", siteId: "site-c" },
  ];
  const photos = [
    { id: uid(), url: "https://picsum.photos/seed/sitex1/400/300", caption: "測試", date: todayStr(), siteId: "site-a" },
    { id: uid(), url: "https://picsum.photos/seed/sitex2/400/300", caption: "測試", date: todayStr(), siteId: "site-a" },
    { id: uid(), url: "https://picsum.photos/seed/sitex3/400/300", caption: "測試", date: todayStr(), siteId: "site-b" },
  ];
  const docs = [
    { id: uid(), type: "收文", title: "測試", who: "監造單位", date: todayStr(), siteId: "site-a" },
    { id: uid(), type: "發文", title: "測試", who: "業主", date: todayStr(), status: "已發文", siteId: "site-a" },
    { id: uid(), type: "收文", title: "測試", who: "廠商", date: todayStr(), siteId: "site-b" },
  ];
  const roster = ["韓明義", "陳振平", "李忠安", "葉漢濱", "周明宗", "王鴻昌", "林克任"];
  const workers = roster.map((name) => ({ id: uid(), name, note: "" }));
  const drawings = [
    { id: uid(), title: "測試", version: "Rev.C", date: todayStr(), url: "", siteId: "site-a" },
    { id: uid(), title: "測試", version: "Rev.A", date: todayStr(), url: "", siteId: "site-a" },
  ];
  const thisMonth = todayStr().slice(0, 7);
  const valuations = [
    { id: uid(), month: shiftMonth(thisMonth, -2), amount: 15000000, siteId: "site-a" },
    { id: uid(), month: shiftMonth(thisMonth, -1), amount: 20000000, siteId: "site-a" },
    { id: uid(), month: shiftMonth(thisMonth, -1), amount: 8000000, siteId: "site-b" },
  ];
  return { sites, events, photos, docs, workers, attendance: {}, drawings, valuations };
}

// ---- 主程式 ------------------------------------------------------------
function ConstructionApp() {
  const [view, setView] = useState("splash"); // splash | login | home | site | worker
  const [account, setAccount] = useState("");
  const [currentSiteId, setCurrentSiteId] = useState(null);
  const [currentWorkerId, setCurrentWorkerId] = useState(null);
  const [siteTab, setSiteTab] = useState("calendar");
  const [workerMonth, setWorkerMonth] = useState(todayStr().slice(0, 7));
  const [loading, setLoading] = useState(true);

  const [sites, setSites] = useState([]);
  const [events, setEvents] = useState([]);
  const [photos, setPhotos] = useState([]);
  const [docs, setDocs] = useState([]);
  const [workers, setWorkers] = useState([]);
  const [attendance, setAttendance] = useState({});
  const [attDate, setAttDate] = useState(todayStr());
  const [drawings, setDrawings] = useState([]);
  const [valuations, setValuations] = useState([]);

  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState("");

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 1800); };

  useEffect(() => {
    setViewportScale(false);
  }, []);

  useEffect(() => {
    (async () => {
      const seed = buildSeed();
      try {
        const [s, e, p, d, w, a, dw, vl] = await Promise.allSettled([
          window.storage.get(K_SITES, true),
          window.storage.get(K_EVENTS, true),
          window.storage.get(K_PHOTOS, true),
          window.storage.get(K_DOCS, true),
          window.storage.get(K_WORKERS, true),
          window.storage.get(K_ATTEND, true),
          window.storage.get(K_DRAWINGS, true),
          window.storage.get(K_VALUATIONS, true),
        ]);
        setSites(s.status === "fulfilled" && s.value ? JSON.parse(s.value.value) : seed.sites);
        setEvents(e.status === "fulfilled" && e.value ? JSON.parse(e.value.value) : seed.events);
        setPhotos(p.status === "fulfilled" && p.value ? JSON.parse(p.value.value) : seed.photos);
        setDocs(d.status === "fulfilled" && d.value ? JSON.parse(d.value.value) : seed.docs);
        setWorkers(w.status === "fulfilled" && w.value ? JSON.parse(w.value.value) : seed.workers);
        setAttendance(a.status === "fulfilled" && a.value ? JSON.parse(a.value.value) : seed.attendance);
        setDrawings(dw.status === "fulfilled" && dw.value ? JSON.parse(dw.value.value) : seed.drawings);
        setValuations(vl.status === "fulfilled" && vl.value ? JSON.parse(vl.value.value) : seed.valuations);
      } catch (err) {
        console.error("讀取失敗", err);
        setSites(seed.sites); setEvents(seed.events); setPhotos(seed.photos);
        setDocs(seed.docs); setWorkers(seed.workers); setAttendance(seed.attendance);
        setDrawings(seed.drawings); setValuations(seed.valuations);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const persist = useCallback(async (key, value) => {
    try { await window.storage.set(key, JSON.stringify(value), true); }
    catch (err) { console.error("儲存失敗", err); }
  }, []);

  const addSite = (s) => {
    const next = [...sites, { id: uid(), ...s }];
    setSites(next); persist(K_SITES, next); showToast("已新增工地");
  };

  const addEvent = (ev) => {
    const next = [...events, { id: uid(), ...ev }].sort((a, b) => a.date.localeCompare(b.date));
    setEvents(next); persist(K_EVENTS, next); showToast("已新增行程");
  };
  const removeEvent = (id) => {
    const next = events.filter((e) => e.id !== id);
    setEvents(next); persist(K_EVENTS, next);
  };

  const addPhoto = (ph) => {
    const next = [{ id: uid(), ...ph }, ...photos];
    setPhotos(next); persist(K_PHOTOS, next); showToast("已新增照片");
  };
  const removePhoto = (id) => {
    const next = photos.filter((p) => p.id !== id);
    setPhotos(next); persist(K_PHOTOS, next);
  };

  const addDoc = (dc) => {
    const next = [{ id: uid(), ...dc }, ...docs];
    setDocs(next); persist(K_DOCS, next); showToast("已新增文件");
  };
  const toggleDocStatus = (id) => {
    const next = docs.map((d) => d.id === id && d.type === "發文" ? { ...d, status: d.status === "已發文" ? "未發文" : "已發文" } : d);
    setDocs(next); persist(K_DOCS, next);
  };
  const removeDoc = (id) => {
    const next = docs.filter((d) => d.id !== id);
    setDocs(next); persist(K_DOCS, next);
  };

  const addWorker = (wk) => {
    const next = [...workers, { id: uid(), ...wk }];
    setWorkers(next); persist(K_WORKERS, next); showToast("已新增工人");
  };
  const removeWorker = (id) => {
    const next = workers.filter((w) => w.id !== id);
    setWorkers(next); persist(K_WORKERS, next);
  };

  const setAttendanceStatus = (date, siteId, workerId, status) => {
    const key = `${siteId}__${workerId}`;
    const next = { ...attendance, [date]: { ...(attendance[date] || {}), [key]: status } };
    setAttendance(next); persist(K_ATTEND, next);
  };

  const markAllPresent = (date, siteId, workerIds) => {
    const dayRecord = { ...(attendance[date] || {}) };
    workerIds.forEach((wid) => { dayRecord[`${siteId}__${wid}`] = "全天"; });
    const next = { ...attendance, [date]: dayRecord };
    setAttendance(next); persist(K_ATTEND, next);
    showToast("已全部標記全天");
  };

  const addDrawing = (dw) => {
    const next = [{ id: uid(), ...dw }, ...drawings];
    setDrawings(next); persist(K_DRAWINGS, next); showToast("已新增圖說");
  };
  const removeDrawing = (id) => {
    const next = drawings.filter((d) => d.id !== id);
    setDrawings(next); persist(K_DRAWINGS, next);
  };

  const addValuation = (v) => {
    const next = [{ id: uid(), ...v }, ...valuations];
    setValuations(next); persist(K_VALUATIONS, next); showToast("已新增估驗");
  };
  const removeValuation = (id) => {
    const next = valuations.filter((v) => v.id !== id);
    setValuations(next); persist(K_VALUATIONS, next);
  };

  const resetDemo = async () => {
    const seed = buildSeed();
    setSites(seed.sites); setEvents(seed.events); setPhotos(seed.photos);
    setDocs(seed.docs); setWorkers(seed.workers); setAttendance(seed.attendance);
    setDrawings(seed.drawings); setValuations(seed.valuations);
    setAttDate(todayStr());
    await Promise.all([
      persist(K_SITES, seed.sites), persist(K_EVENTS, seed.events), persist(K_PHOTOS, seed.photos),
      persist(K_DOCS, seed.docs), persist(K_WORKERS, seed.workers), persist(K_ATTEND, seed.attendance),
      persist(K_DRAWINGS, seed.drawings), persist(K_VALUATIONS, seed.valuations),
    ]);
    showToast("已清除測試資料");
  };

  if (view === "splash") return <Splash onDone={() => setView("login")} />;
  if (view === "login") return <Login onLogin={(acc) => { setAccount(acc); setView("home"); }} />;

  const currentSite = sites.find((s) => s.id === currentSiteId);
  const currentWorker = workers.find((w) => w.id === currentWorkerId);

  return (
    <BlueprintBG>
      <div className="max-w-md mx-auto min-h-screen flex flex-col relative pb-4">
        {view === "home" && (
          <HomeHeader account={account} onLogout={() => { setView("login"); setAccount(""); }} />
        )}
        {view === "site" && currentSite && (
          <BackHeader tag="工地現場" title={currentSite.name} subtitle={currentSite.address}
            onBack={() => { setView("home"); setSiteTab("calendar"); }}
            stats={{
              contractAmount: currentSite.contractAmount || 0,
              estimatedAmount: valuations.filter((v) => v.siteId === currentSiteId).reduce((sum, v) => sum + Number(v.amount || 0), 0),
            }} />
        )}
        {view === "worker" && currentWorker && (
          <BackHeader tag="個人出勤" title={currentWorker.name} subtitle={currentWorker.note}
            onBack={() => setView("home")} />
        )}

        <main className="flex-1 px-4 pt-5 pb-24">
          {loading ? (
            <p style={{ color: COLOR.ink }} className="text-center font-bold mt-10 animate-pulse">載入中…</p>
          ) : view === "home" ? (
            <HomeView
              sites={sites}
              events={events}
              workers={workers}
              attendance={attendance}
              onEnterSite={(id) => { setCurrentSiteId(id); setSiteTab("calendar"); setView("site"); }}
              onOpenWorker={(id) => { setCurrentWorkerId(id); setWorkerMonth(todayStr().slice(0, 7)); setView("worker"); }}
              onAddEvent={() => setModal({ type: "event" })}
              onAddSite={() => setModal({ type: "site" })}
            />
          ) : view === "worker" && currentWorker ? (
            <WorkerDetailView worker={currentWorker} sites={sites} attendance={attendance} monthStr={workerMonth} onMonthChange={setWorkerMonth} />
          ) : view === "site" && currentSite ? (
            <>
              {siteTab === "calendar" && (
                <CalendarTab
                  events={events.filter((e) => e.siteId === currentSiteId)}
                  onAdd={() => setModal({ type: "event", siteId: currentSiteId })}
                  onRemove={removeEvent}
                />
              )}
              {siteTab === "photos" && (
                <PhotosTab
                  photos={photos.filter((p) => p.siteId === currentSiteId)}
                  onAdd={() => setModal({ type: "photo", siteId: currentSiteId })}
                  onRemove={removePhoto}
                />
              )}
              {siteTab === "docs" && (
                <DocsTab
                  docs={docs.filter((d) => d.siteId === currentSiteId)}
                  onAdd={() => setModal({ type: "doc", siteId: currentSiteId })}
                  onToggleStatus={toggleDocStatus}
                  onRemove={removeDoc}
                />
              )}
              {siteTab === "attendance" && (
                <AttendanceTab
                  workers={workers}
                  attendance={attendance}
                  siteId={currentSiteId}
                  date={attDate}
                  onDateChange={setAttDate}
                  onCycle={(workerId) => {
                    const key = `${currentSiteId}__${workerId}`;
                    const cur = (attendance[attDate] || {})[key] || "未記錄";
                    const nextStatus = ATTEND_STATUS[(ATTEND_STATUS.indexOf(cur) + 1) % ATTEND_STATUS.length];
                    setAttendanceStatus(attDate, currentSiteId, workerId, nextStatus);
                  }}
                  onAddWorker={() => setModal({ type: "worker" })}
                  onRemoveWorker={removeWorker}
                  onMarkAll={() => markAllPresent(attDate, currentSiteId, workers.map((w) => w.id))}
                />
              )}
              {siteTab === "drawings" && (
                <DrawingsTab
                  drawings={drawings.filter((d) => d.siteId === currentSiteId)}
                  onAdd={() => setModal({ type: "drawing", siteId: currentSiteId })}
                  onRemove={removeDrawing}
                />
              )}
              {siteTab === "valuations" && (
                <ValuationsTab
                  valuations={valuations.filter((v) => v.siteId === currentSiteId)}
                  contractAmount={currentSite.contractAmount || 0}
                  onAdd={() => setModal({ type: "valuation", siteId: currentSiteId })}
                  onRemove={removeValuation}
                />
              )}
            </>
          ) : null}
        </main>

        {view === "home" && !loading && (
          <button onClick={resetDemo} style={{ color: COLOR.muted }} className="mx-auto mb-2 flex items-center gap-1 text-xs opacity-70">
            <RotateCcw size={12} /> 清除測試資料
          </button>
        )}

        {view === "site" && (
          <nav style={{ background: COLOR.surfaceAlt, borderColor: COLOR.red }} className="fixed bottom-0 left-0 right-0 border-t-2">
            <div className="max-w-md mx-auto grid grid-cols-6">
              <NavBtn active={siteTab === "calendar"} label="行事曆" icon={Calendar} onClick={() => setSiteTab("calendar")} />
              <NavBtn active={siteTab === "photos"} label="相簿" icon={ImageIcon} onClick={() => setSiteTab("photos")} />
              <NavBtn active={siteTab === "docs"} label="收發文" icon={FileText} onClick={() => setSiteTab("docs")} />
              <NavBtn active={siteTab === "drawings"} label="圖說" icon={Layers} onClick={() => setSiteTab("drawings")} />
              <NavBtn active={siteTab === "valuations"} label="估驗" icon={DollarSign} onClick={() => setSiteTab("valuations")} />
              <NavBtn active={siteTab === "attendance"} label="出勤" icon={Users} onClick={() => setSiteTab("attendance")} />
            </div>
          </nav>
        )}

        {toast && (
          <div style={{ background: COLOR.surface, borderColor: COLOR.border }} className="fixed bottom-24 left-1/2 -translate-x-1/2 border text-white text-sm px-4 py-2 rounded-full shadow-lg z-50">
            {toast}
          </div>
        )}

        {modal?.type === "event" && (
          <EventModal sites={sites} presetSiteId={modal.siteId} onClose={() => setModal(null)} onSave={(v) => { addEvent(v); setModal(null); }} />
        )}
        {modal?.type === "photo" && (
          <PhotoModal onClose={() => setModal(null)} onSave={(v) => { addPhoto({ ...v, siteId: modal.siteId }); setModal(null); }} />
        )}
        {modal?.type === "doc" && (
          <DocModal onClose={() => setModal(null)} onSave={(v) => { addDoc({ ...v, siteId: modal.siteId }); setModal(null); }} />
        )}
        {modal?.type === "drawing" && (
          <DrawingModal onClose={() => setModal(null)} onSave={(v) => { addDrawing({ ...v, siteId: modal.siteId }); setModal(null); }} />
        )}
        {modal?.type === "valuation" && (
          <ValuationModal onClose={() => setModal(null)} onSave={(v) => { addValuation({ ...v, siteId: modal.siteId }); setModal(null); }} />
        )}
        {modal?.type === "worker" && (
          <WorkerModal onClose={() => setModal(null)} onSave={(v) => { addWorker(v); setModal(null); }} />
        )}
        {modal?.type === "site" && (
          <SiteModal onClose={() => setModal(null)} onSave={(v) => { addSite(v); setModal(null); }} />
        )}
      </div>
    </BlueprintBG>
  );
}


const rootEl = document.getElementById("root");
createRoot(rootEl).render(<ConstructionApp />);

</script>
</body>
</html>
